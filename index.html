<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>School Clicker</title>
  <style>
    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at center, #222 0%, #000 100%);
      color: white;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden; /* Общая прокрутка отключена */
      user-select: none; 
      -webkit-tap-highlight-color: transparent; 
    }

    /* --- Стили экрана загрузки --- */
    #loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 6px solid rgba(255, 255, 255, 0.1);
      border-top-color: #ff9800;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
      box-shadow: 0 0 15px rgba(255, 152, 0, 0.5);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* --- Основной контейнер приложения --- */
    #app {
      display: none;
      height: 100vh;
      width: 100%;
      flex-direction: column;
    }

    /* --- Стили для экранов --- */
    .screen {
      display: none; /* Скрыты по умолчанию */
      flex: 1;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      position: relative;
    }

    .screen.active {
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- ЭКРАН: ТАПАЛКА --- */
    #game-screen {
      justify-content: center;
      align-items: center;
      padding-bottom: 80px; /* Отступ для нижнего меню */
    }

    .score-container {
      font-size: 56px;
      font-weight: bold;
      margin-bottom: 40px;
      text-shadow: 0 2px 10px rgba(255, 255, 255, 0.3);
    }

    .circle-area {
      position: relative;
      width: 280px;
      height: 280px;
      perspective: 1000px;
    }

    .coin {
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #ffb74d, #f57c00);
      border-radius: 50%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 
        0 10px 0 #b26a00, 
        0 15px 30px rgba(0, 0, 0, 0.5), 
        inset 0 2px 5px rgba(255, 255, 255, 0.5);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      cursor: pointer;
    }

    .coin::after {
      content: '';
      position: absolute;
      top: 15px; left: 15px; right: 15px; bottom: 15px;
      border: 4px dashed rgba(255, 255, 255, 0.3);
      border-radius: 50%;
    }

    .coin-text {
      font-size: 32px;
      font-weight: 900;
      color: #111;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.5);
      z-index: 10;
      text-align: center;
      padding: 0 10px;
    }

    .coin:active {
      transform: translateY(5px) rotateX(10deg);
      box-shadow: 
        0 5px 0 #b26a00,
        0 10px 20px rgba(0, 0, 0, 0.5),
        inset 0 2px 5px rgba(255, 255, 255, 0.5);
    }

    .plus-one {
      position: absolute;
      color: #ffffff;
      font-size: 40px;
      font-weight: 900;
      pointer-events: none;
      animation: floatUpFadeOut 2s ease-out;
      opacity: 0;
      z-index: 100;
      text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #fff, 0 0 40px #fff; 
    }

    @keyframes floatUpFadeOut {
      0% { opacity: 0; transform: translate(-50%, -50%) translateY(0) scale(1); }
      5% { opacity: 1; transform: translate(-50%, -50%) translateY(-30px) scale(1.3); }
      100% { opacity: 0; transform: translate(-50%, -50%) translateY(-300px) scale(1.1); }
    }

    /* --- ЭКРАН: СКИНЫ --- */
    #skins-screen {
      padding: 20px;
      padding-bottom: 100px; /* Отступ для меню */
      overflow-y: auto; /* Включаем прокрутку списка скинов */
      align-items: center;
    }

    .skins-header {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #ff9800;
    }

    .skins-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      width: 100%;
    }

    .skin-card {
      background: #333;
      border-radius: 15px;
      padding: 20px 10px;
      text-align: center;
      font-weight: bold;
      font-size: 16px;
      border: 2px solid #444;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .skin-card.selected {
      background: #4a2d00;
      border-color: #ff9800;
      box-shadow: 0 0 15px rgba(255, 152, 0, 0.3);
      color: #ff9800;
    }

    /* --- НИЖНЕЕ НАВИГАЦИОННОЕ МЕНЮ --- */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 70px;
      background: #1a1a1a;
      border-top: 1px solid #333;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 1000;
      box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #777;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      width: 20%;
      height: 100%;
      cursor: pointer;
      transition: color 0.2s;
    }

    /* Иконки-заглушки (кружочки) */
    .nav-icon {
      width: 24px;
      height: 24px;
      background-color: #777;
      border-radius: 5px;
      margin-bottom: 5px;
      transition: background-color 0.2s;
    }

    .nav-item.active {
      color: #ff9800;
    }

    .nav-item.active .nav-icon {
      background-color: #ff9800;
      box-shadow: 0 0 10px rgba(255, 152, 0, 0.5);
    }

    .nav-item.disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

  </style>
</head>
<body>

  <div id="loader">
    <div class="spinner"></div>
    <h2 style="color: #ff9800;">Загрузка...</h2>
  </div>

  <div id="app">

    <div id="game-screen" class="screen active">
      <div class="score-container">
        <span id="score">0</span>
      </div>

      <div class="circle-area">
        <div class="coin" id="tap-zone">
          <span class="coin-text" id="main-coin-text">Музика</span>
        </div>
      </div>
    </div>

    <div id="skins-screen" class="screen">
      <div class="skins-header">Вибір предмета</div>
      <div class="skins-grid" id="skins-container">
        </div>
    </div>

    <div class="bottom-nav">
      <div class="nav-item" id="nav-skins" onclick="switchTab('skins-screen', 'nav-skins')">
        <div class="nav-icon" style="border-radius: 50%;"></div>
        <span>Скини</span>
      </div>
      <div class="nav-item disabled">
        <div class="nav-icon"></div>
        <span>Актив</span>
      </div>
      <div class="nav-item active" id="nav-game" onclick="switchTab('game-screen', 'nav-game')">
        <div class="nav-icon" style="border-radius: 50%; background: radial-gradient(#ffb74d, #f57c00);"></div>
        <span>Тапалка</span>
      </div>
      <div class="nav-item disabled">
        <div class="nav-icon"></div>
        <span>Онови</span>
      </div>
      <div class="nav-item disabled">
        <div class="nav-icon" style="clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);"></div>
        <span>Бали</span>
      </div>
    </div>

  </div>

  <script>
    // --- ИГРОВАЯ ЛОГИКА ---
    let score = 0;
    const scoreElement = document.getElementById("score");
    const tapZone = document.getElementById("tap-zone");

    function tap(event) {
      score++;
      scoreElement.innerText = score;
      
      if (navigator.vibrate) navigator.vibrate(50);

      if (event) {
          const x = event.clientX;
          const y = event.clientY;

          const plusOne = document.createElement('span');
          plusOne.classList.add('plus-one');
          plusOne.innerText = '+1';

          plusOne.style.left = `${x}px`;
          plusOne.style.top = `${y}px`;

          document.body.appendChild(plusOne);

          setTimeout(() => { plusOne.remove(); }, 2000);
      }
    }

    tapZone.addEventListener('click', tap);

    // --- ЛОГИКА МЕНЮ (ПЕРЕКЛЮЧЕНИЕ ЭКРАНОВ) ---
    function switchTab(screenId, navId) {
      // Скрываем все экраны
      document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
      // Снимаем подсветку со всех кнопок меню
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      
      // Показываем нужный экран и подсвечиваем нужную кнопку
      document.getElementById(screenId).classList.add('active');
      document.getElementById(navId).classList.add('active');
    }

    // --- ЛОГИКА СКИНОВ ---
    const skinsList = [
      "Музика", "Малювання", "Технології", "Фізика", "Фізра", 
      "Біологія", "Укр.мова", "Укр.літ", "Географія", 
      "Геометрія", "Алгебра", "Англ.мова", "ІНФОРМАТИКА"
    ];

    const skinsContainer = document.getElementById('skins-container');
    const mainCoinText = document.getElementById('main-coin-text');
    let currentSkin = "Музика"; // Скин по умолчанию

    // Генерация карточек скинов
    skinsList.forEach(skinName => {
      const card = document.createElement('div');
      card.classList.add('skin-card');
      if (skinName === currentSkin) card.classList.add('selected');
      card.innerText = skinName;

      // Обработка клика по скину
      card.onclick = () => {
        // Убираем рамку со старого скина
        document.querySelectorAll('.skin-card').forEach(el => el.classList.remove('selected'));
        // Добавляем рамку на нажатый
        card.classList.add('selected');
        
        // Меняем текст на главной монете
        currentSkin = skinName;
        mainCoinText.innerText = currentSkin;

        // Автоматически возвращаем игрока на экран "Тапалка" (по желанию можно убрать эту строчку)
        switchTab('game-screen', 'nav-game');
      };

      skinsContainer.appendChild(card);
    });

    // --- ЗАГРУЗКА ПРИЛОЖЕНИЯ ---
    window.onload = function() {
      setTimeout(function() {
        document.getElementById("loader").style.display = "none";
        document.getElementById("app").style.display = "flex";
      }, 2000); 
    };
  </script>

</body>
</html>
